apiVersion: apps/v1
kind: Deployment
metadata:
  name: belnova-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: belnova
  template:
    metadata:
      labels:
        app: belnova
    spec:
      containers:
        - name: belnova-container
          image: ghcr.io/belnovatech/belnova-website:latest
          ports:
            - containerPort: 80
